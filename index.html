<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Universo Escolar</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Trebuchet MS',Arial,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(-45deg,#ff0080,#7928ca,#00c6ff,#00ff95,#ffcc00);
background-size:500% 500%;
animation:bg 15s ease infinite;
padding:20px;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.game{
width:95%;
max-width:1100px;
padding:35px;
border-radius:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
box-shadow:0 15px 60px rgba(0,0,0,.45);
text-align:center;
color:white;
border:2px solid rgba(255,255,255,.2);
animation:appear .7s ease;
}

@keyframes appear{
from{
transform:scale(.85);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}
}

.logo{
font-size:60px;
font-weight:900;
margin-bottom:10px;
background:linear-gradient(90deg,#fff,#ffe600,#00ffea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 20px rgba(255,255,255,.3);
letter-spacing:2px;
}

.subtitle{
font-size:22px;
margin-bottom:30px;
color:#ffffff;
font-weight:bold;
text-shadow:0 0 10px rgba(255,255,255,.4);
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

button{
border:none;
padding:18px;
border-radius:22px;
font-size:20px;
font-weight:900;
color:white;
cursor:pointer;
transition:.25s;
box-shadow:0 8px 0 rgba(0,0,0,.2);
}

button:hover{
transform:scale(1.05);
}

button:active{
transform:translateY(4px);
box-shadow:0 4px 0 rgba(0,0,0,.2);
}

.math{background:linear-gradient(135deg,#00c853,#64dd17);}
.port{background:linear-gradient(135deg,#ff4081,#f50057);}
.cien{background:linear-gradient(135deg,#00b0ff,#2979ff);}
.geo{background:linear-gradient(135deg,#ff9100,#ff3d00);}
.hist{background:linear-gradient(135deg,#8d6e63,#5d4037);}
.ing{background:linear-gradient(135deg,#7c4dff,#651fff);}
.play{
background:linear-gradient(135deg,#00e5ff,#00b0ff);
margin-top:20px;
width:100%;
font-size:24px;
letter-spacing:1px;
}

.stats{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
gap:15px;
margin:25px 0;
}

.card{
background:rgba(255,255,255,.18);
padding:18px 28px;
border-radius:24px;
min-width:170px;
font-size:24px;
font-weight:900;
backdrop-filter:blur(8px);
box-shadow:0 10px 20px rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.2);
}

.question{
font-size:42px;
margin:35px 0;
min-height:100px;
font-weight:900;
line-height:1.4;
text-shadow:0 0 12px rgba(0,0,0,.25);
}

input{
width:90%;
max-width:650px;
padding:20px;
border:none;
border-radius:24px;
font-size:28px;
text-align:center;
background:rgba(255,255,255,.95);
box-shadow:0 8px 20px rgba(0,0,0,.2);
outline:none;
font-weight:bold;
transition:.2s;
}

input:focus{
transform:scale(1.02);
box-shadow:0 0 20px rgba(0,255,255,.8);
}

.message{
font-size:30px;
margin-top:25px;
min-height:40px;
font-weight:900;
text-shadow:0 0 12px rgba(255,255,255,.3);
}

.hidden{
display:none;
}

.time-bar{
width:100%;
height:24px;
background:rgba(255,255,255,.2);
border-radius:30px;
overflow:hidden;
margin-top:25px;
border:2px solid rgba(255,255,255,.25);
box-shadow:0 5px 15px rgba(0,0,0,.25);
}

#timeFill{
width:100%;
height:100%;
background:linear-gradient(90deg,#00ff95,#00e5ff,#ffeb3b,#ff9800,#ff1744);
background-size:300% 300%;
animation:gradientMove 3s infinite linear;
transition:1s linear;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.menu button{
min-height:85px;
}

button:hover{
filter:brightness(1.15);
box-shadow:0 12px 30px rgba(255,255,255,.25);
}

@media(max-width:700px){
.logo{font-size:36px;}
.question{font-size:28px;}
button{width:100%;}
input{width:100%;font-size:20px;}
}
</style>
</head>
<body>

<div class="game">

<div class="logo">🧠 Universo Escolar</div>
<div class="subtitle">Academia Suprema • Teste Jogável</div>

<div id="menu">
<div class="menu">
<button class="math" onclick="startGame('matematica')">➕ Matemática</button>
<button class="port" onclick="startGame('portugues')">📚 Português</button>
<button class="cien" onclick="startGame('ciencias')">🔬 Ciências</button>
<button class="geo" onclick="startGame('geografia')">🌎 Geografia</button>
<button class="hist" onclick="startGame('historia')">🏺 História</button>
<button class="ing" onclick="startGame('ingles')">🇺🇸 Inglês</button>
</div>
</div>

<div id="gameArea" class="hidden">

<div class="stats">
<div class="card">⭐ Pontos<br><span id="score">0</span></div>
<div class="card">❤️ Vidas<br><span id="lives">3</span></div>
<div class="card">🎓 Ano<br><span id="year">1º</span></div>
</div>

<div class="time-bar">
<div id="timeFill"></div>
</div>

<div class="question" id="question"></div>

<input id="answer" placeholder="Digite sua resposta">

<button class="play" onclick="checkAnswer()">RESPONDER</button>

<div class="message" id="message"></div>

</div>

</div>

<script>
const questions={
matematica:[],

portugues:[
[{q:'Plural de bola',a:'bolas'}],
[{q:'Feminino de menino',a:'menina'}],
[{q:'Correto: jeito ou geito?',a:'jeito'}],
[{q:'Sinônimo de feliz',a:'alegre'}],
[{q:'Qual palavra indica ação?',a:'verbo'}],
[{q:'Qual é o sujeito em João correu?',a:'joao'}],
[{q:'Plural de cidadão',a:'cidadãos'}],
[{q:'O que é metáfora?',a:'comparação'}],
[{q:'O que é linguagem formal?',a:'culta'}]
],

ciencias:[
[{q:'Qual planeta vivemos?',a:'terra'}],
[{q:'Qual estrela ilumina a Terra?',a:'sol'}],
[{q:'Água sólida é?',a:'gelo'}],
[{q:'Qual órgão bombeia sangue?',a:'coração'}],
[{q:'Qual gás respiramos?',a:'oxigênio'}],
[{q:'O que as plantas fazem com luz?',a:'fotossíntese'}],
[{q:'Camada que protege a Terra?',a:'ozônio'}],
[{q:'Maior órgão do corpo?',a:'pele'}],
[{q:'O que é DNA?',a:'genética'}]
],

geografia:[
[{q:'Qual país moramos?',a:'brasil'}],
[{q:'Capital do Brasil?',a:'brasília'}],
[{q:'Quantos continentes existem?',a:'6'}],
[{q:'Maior oceano?',a:'pacífico'}],
[{q:'Maior país do mundo?',a:'rússia'}],
[{q:'Linha que divide a Terra?',a:'equador'}],
[{q:'Maior floresta do mundo?',a:'amazônia'}],
[{q:'O que causa terremotos?',a:'placas tectônicas'}],
[{q:'O que é clima?',a:'tempo'}]
],

historia:[
[{q:'Quem descobriu o Brasil?',a:'cabral'}],
[{q:'Ano da independência do Brasil?',a:'1822'}],
[{q:'Primeiro presidente do Brasil?',a:'deodoro'}],
[{q:'Quem libertou os escravos?',a:'princesa isabel'}],
[{q:'Ano da Proclamação da República?',a:'1889'}],
[{q:'Quem foi Tiradentes?',a:'herói'}],
[{q:'O que foi a Revolução Francesa?',a:'revolução'}],
[{q:'Quem liderou a Alemanha nazista?',a:'hitler'}],
[{q:'Quando terminou a Segunda Guerra?',a:'1945'}]
],

ingles:[
[{q:'Tradução de dog',a:'cachorro'}],
[{q:'Tradução de house',a:'casa'}],
[{q:'Tradução de school',a:'escola'}],
[{q:'Como se diz vermelho?',a:'red'}],
[{q:'Como se diz obrigado?',a:'thank you'}],
[{q:'Tradução de book',a:'livro'}],
[{q:'Como se diz água?',a:'water'}],
[{q:'Tradução de computer',a:'computador'}],
[{q:'Como se diz amizade?',a:'friendship'}]
]
};

let mathUsed = new Set();
let currentQuestionId = '';
let answering = false;

let mode='';
let score=0;
let lives=3;
let year=1;
let answer='';
let timer=20;
let countdown;
let usedQuestions={};
let locked=false;

function normalize(text){
return text.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[.,!?]/g,'').toLowerCase().trim();
}

function startGame(selected){
mode=selected;
score=0;
lives=3;
year=1;
usedQuestions={};

for(let i=1;i<=9;i++){
usedQuestions[i]=[];
}

document.getElementById('menu').classList.add('hidden');
document.getElementById('gameArea').classList.remove('hidden');
updateStats();
newQuestion();
}

function updateStats(){
document.getElementById('score').innerText=score;
document.getElementById('lives').innerText=lives;
document.getElementById('year').innerText=year+'º';
}

function generateMathQuestion(){

let q='';
let a='';
let unique=false;
let attempts=0;

while(!unique && attempts < 500){

attempts++;

if(year===1){
let n1=Math.floor(Math.random()*20)+1;
let n2=Math.floor(Math.random()*20)+1;
let op=Math.random()>0.5?'+':'-';

if(op==='+'){
q=`Quanto é ${n1} + ${n2}?`;
a=(n1+n2).toString();
}else{
if(n2>n1){
[n1,n2]=[n2,n1];
}
q=`Quanto é ${n1} - ${n2}?`;
a=(n1-n2).toString();
}
}

else if(year===2){
let n1=Math.floor(Math.random()*50)+10;
let n2=Math.floor(Math.random()*30)+1;
q=`Quanto é ${n1} - ${n2}?`;
a=(n1-n2).toString();
}

else if(year===3){
let n1=Math.floor(Math.random()*15)+2;
let n2=Math.floor(Math.random()*15)+2;
q=`Quanto é ${n1} × ${n2}?`;
a=(n1*n2).toString();
}

else if(year===4){
let n2=Math.floor(Math.random()*12)+2;
let result=Math.floor(Math.random()*20)+2;
let n1=n2*result;
q=`Quanto é ${n1} ÷ ${n2}?`;
a=result.toString();
}

else if(year===5){
let n1=Math.floor(Math.random()*25)+5;
q=`Quanto é ${n1}² ?`;
a=(n1*n1).toString();
}

else if(year===6){
let total=Math.floor(Math.random()*500)+100;
let percent=[10,20,25,30,40,50,75][Math.floor(Math.random()*7)];
q=`Quanto é ${percent}% de ${total}?`;
a=((total*percent)/100).toString();
}

else if(year===7){
let value=Math.floor(Math.random()*20)+2;
q=`Qual é a raiz quadrada de ${value*value}?`;
a=value.toString();
}

else if(year===8){
let x=Math.floor(Math.random()*20)+1;
let n=Math.floor(Math.random()*15)+1;
q=`Resolva: x + ${n} = ${x+n}`;
a=x.toString();
}

else if(year===9){
let coef=Math.floor(Math.random()*9)+2;
let x=Math.floor(Math.random()*15)+1;
let n=Math.floor(Math.random()*20)+1;
q=`Resolva: ${coef}x + ${n} = ${(coef*x)+n}`;
a=x.toString();
}

currentQuestionId=q+'-'+a;

if(!mathUsed.has(currentQuestionId)){
mathUsed.add(currentQuestionId);
unique=true;
}

if(mathUsed.size>1000){
mathUsed.clear();
}
}

if(!unique){
mathUsed.clear();
return generateMathQuestion();
}

return {q,a};
}

function newQuestion(){

answering=false;
locked=false;
clearInterval(countdown);

document.getElementById('message').innerText='';
document.getElementById('answer').value='';
document.getElementById('answer').focus();

if(mode==='matematica'){

const generated=generateMathQuestion();
answer=generated.a;
document.getElementById('question').innerText=generated.q;
startTimer();
return;
}

const list=questions[mode][year-1];

if(!list || list.length===0){

victory();
return;
}

let available=list.filter((q,index)=>!usedQuestions[year].includes(index));

if(available.length===0){
usedQuestions[year]=[];
available=[...list];
}

if(available.length===0){
usedQuestions[year]=[];
available=[...list];
}

let random=available[Math.floor(Math.random()*available.length)];

if(!random){
random=list[Math.floor(Math.random()*list.length)];
}
const originalIndex=list.indexOf(random);
usedQuestions[year].push(originalIndex);

answer=random.a;
document.getElementById('question').innerText=random.q;

startTimer();
}

function startTimer(){
timer=Math.max(8,20-year);
updateBar();

countdown=setInterval(()=>{

timer--;
updateBar();

if(timer<=0){
clearInterval(countdown);
loseLife('⏰ Tempo esgotado!');
}

},1000);
}

function updateBar(){
const percent=(timer/20)*100;
document.getElementById('timeFill').style.width=percent+'%';
}

function checkAnswer(){

if(answering)return;
answering=true;

if(locked || lives<=0)return;
locked=true;

const button=document.querySelector('.play');
button.disabled=true;

const user=document.getElementById('answer').value;

if(normalize(user.replace(',','.'))===normalize(answer.toString().replace(',','.'))){

clearInterval(countdown);

score+=10;

if(score>=year*30 && year<9){
year++;
}

updateStats();

document.getElementById('message').style.color='#00ff95';
document.getElementById('message').innerText='🎉 RESPOSTA CORRETA!';

if(score>=270){
victory();
return;
}

setTimeout(()=>{
button.disabled=false;
newQuestion();
},1200);

}else{
loseLife('❌ RESPOSTA ERRADA!');
}
}

function loseLife(text){
clearInterval(countdown);

lives=Math.max(0,lives-1);
updateStats();

document.getElementById('message').style.color='#ff5252';
document.getElementById('message').innerText=text+' Correta: '+answer;

if(lives<=0){
setTimeout(()=>{
alert('🏆 Fim de jogo! Pontuação: '+score);
location.reload();
},1200);
}else{
setTimeout(()=>{
document.querySelector('.play').disabled=false;
newQuestion();
},1800);
}
}

function victory(){
clearInterval(countdown);

document.getElementById('question').innerText='🏆 VOCÊ ZEROU O JOGO!';
document.getElementById('message').innerText='⭐ Mestre Supremo do Conhecimento ⭐';

setTimeout(()=>{
alert('🎓 Vitória absoluta!');
location.reload();
},3000);
}

document.addEventListener('keydown',e=>{

if(answering)return;
if(e.key==='Enter'){
if(!document.getElementById('gameArea').classList.contains('hidden')){
checkAnswer();
}
}
});
</script>

</body>
</html>
